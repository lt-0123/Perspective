<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dLLMs vs. ARMs Generated Token Timeline</title>
  <style>
    :root {
      --panel: #0f172a;
      --ink: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;

      --decode-bright: #22c55e;
      --decode-dark: #166534;
      --decode-bg-bright: #dcfce7;
      --decode-bg-dark: #bbf7d0;

      /* refine darker palette */
      --refine-bright: #b45309;
      --refine-dark: #78350f;
      --refine-bg-bright: #fcd34d;
      --refine-bg-dark: #f59e0b;

      --ar-bright: #2563eb;
      --ar-dark: #1e3a8a;
      --ar-bg-bright: #dbeafe;
      --ar-bg-dark: #bfdbfe;

      --base-fg: #cbd5e1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 10%, #111827, #020617 70%);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Noto Sans SC", "PingFang SC", sans-serif;
    }
    .container {
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 22px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 22px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .btn {
      border: 1px solid #475569;
      background: #111827;
      color: #e5e7eb;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .info {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(8, minmax(110px, 1fr));
      gap: 8px;
      font-size: 13px;
    }
    .info .item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #111827;
      padding: 8px 10px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend i {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: -1px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .pane-title {
      margin-bottom: 8px;
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 700;
    }
    .token-line {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #020617;
      padding: 14px;
      min-height: 260px;
      max-height: 70vh;
      overflow: auto;
    }
    .t-base { color: var(--base-fg); }
    .t-decode-new {
      color: var(--decode-bright);
      background: var(--decode-bg-bright);
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 800;
    }
    .t-decode-old {
      color: var(--decode-dark);
      background: var(--decode-bg-dark);
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 700;
    }
    .t-refine-new {
      color: var(--refine-bright);
      background: var(--refine-bg-bright);
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 800;
    }
    .t-refine-old {
      color: var(--refine-dark);
      background: var(--refine-bg-dark);
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 700;
    }
    .t-ar-new {
      color: var(--ar-bright);
      background: var(--ar-bg-bright);
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 800;
    }
    .t-ar-old {
      color: var(--ar-dark);
      background: var(--ar-bg-dark);
      border-radius: 4px;
      padding: 0 2px;
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .info { grid-template-columns: repeat(4, minmax(110px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>dLLMs vs. ARMs Generated Token Timeline</h1>
      <div class="controls">
        <button id="playBtn" class="btn">Play</button>
        <button id="pauseBtn" class="btn">Pause</button>
        <button id="prevBtn" class="btn">Previous Frame</button>
        <button id="nextBtn" class="btn">Next Frame</button>
        <input id="frameSlider" type="range" min="0" value="0" />
        <span style="color:#94a3b8;font-size:13px;">Playback Speed</span>
        <input id="speedSlider" type="range" min="1" max="20" value="8" />
        <span id="speedText" style="color:#94a3b8;font-size:13px;">8 fps</span>
      </div>

      <div class="info" id="infoBox"></div>

      <div class="legend">
        <span><i style="background:var(--decode-bg-bright)"></i>Decode new</span>
        <span><i style="background:var(--decode-bg-dark)"></i>Decode old</span>
        <span><i style="background:var(--refine-bg-bright)"></i>Refine new</span>
        <span><i style="background:var(--refine-bg-dark)"></i>Refine old</span>
        <span><i style="background:var(--ar-bg-bright)"></i>AR new</span>
        <span><i style="background:var(--ar-bg-dark)"></i>AR old</span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="pane-title">Left: dLLMs (LLaDA-2.1-Mini)</div>
        <div id="leftTokenLine" class="token-line"></div>
      </div>
      <div class="card">
        <div class="pane-title">Right: ARMs () </div>
        <div id="rightTokenLine" class="token-line"></div>
      </div>
    </div>
  </div>

    const rightTokenLine = document.getElementById('rightTokenLine');
    const infoBox = document.getElementById('infoBox');
    let curFrame = 0;
    let timer = null;

    slider.max = String(Math.max(0, payload.total_frames - 1));

    function esc(s) {
      return s.replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function clsName(c) {
      if (c === 'decode_new') return 't-decode-new';
      if (c === 'decode_old') return 't-decode-old';
      if (c === 'refine_new') return 't-refine-new';
      if (c === 'refine_old') return 't-refine-old';
      return 't-base';
    }

    function render(frameId) {
      if (payload.total_frames === 0) return;
      curFrame = Math.max(0, Math.min(payload.total_frames - 1, frameId));
      slider.value = String(curFrame);

      const leftIdx = Math.min(curFrame, Math.max(0, payload.n_frames - 1));
      const left = payload.left_frames[leftIdx];
      const leftSpans = [];
      for (let i = 0; i < left.tokens.length; i++) {
        leftSpans.push(`<span class="${clsName(left.classes[i])}">${esc(left.tokens[i])}</span>`);
      }
      leftTokenLine.innerHTML = leftSpans.join('');

      const arTokens = payload.ar_tokens;
      const visible = Math.min(curFrame, arTokens.length);
      const newIdx = (curFrame > 0 && curFrame <= arTokens.length) ? (curFrame - 1) : -1;
      const rightSpans = [];
      for (let i = 0; i < visible; i++) {
        const cls = i === newIdx ? 't-ar-new' : 't-ar-old';
        rightSpans.push(`<span class="${cls}">${esc(arTokens[i])}</span>`);
      }
      rightTokenLine.innerHTML = rightSpans.join('');

      infoBox.innerHTML = `
        <div class="item"><b>frame</b><br>${curFrame}</div>
        <div class="item"><b>window / step</b><br>${left.window} / ${left.step}</div>
        <div class="item"><b>decode_count</b><br>${left.decode_count}</div>
        <div class="item"><b>refine_count</b><br>${left.refine_count}</div>
        <div class="item"><b>mask_remaining</b><br>${left.mask_remaining}</div>
        <div class="item"><b>AR progress</b><br>${visible} / ${arTokens.length}</div>
        <div class="item"><b>generated_start_pos</b><br>${payload.generated_start}</div>
      `;
    }

    function stop() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    function play() {
      stop();
      const fps = Number(speedSlider.value);
      timer = setInterval(() => {
        if (curFrame >= payload.total_frames - 1) {
          stop();
          return;
        }
        render(curFrame + 1);
      }, Math.max(20, Math.floor(1000 / fps)));
    }

    document.getElementById('playBtn').onclick = play;
    document.getElementById('pauseBtn').onclick = stop;
    document.getElementById('prevBtn').onclick = () => render(curFrame - 1);
    document.getElementById('nextBtn').onclick = () => render(curFrame + 1);
    slider.oninput = () => render(Number(slider.value));
    speedSlider.oninput = () => {
      speedText.textContent = `${speedSlider.value} fps`;
      if (timer) play();
    };

    render(0);
  </script>
</body>
</html>
